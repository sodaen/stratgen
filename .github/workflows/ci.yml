name: ci
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install fastapi uvicorn pydantic[dotenv] sqlalchemy python-pptx pillow httpx anyio pytest
      - name: Run pytest
        run: pytest -q
      - name: Smoke (inline)
        run: python scripts/smoke_inline.py
