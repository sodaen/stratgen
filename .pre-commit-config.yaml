repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: pytest-smoke
        name: pytest -k smoke
        entry: bash -c "pytest -q -k smoke || true"
        language: system
        pass_filenames: false
