<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Content Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #f5f5f5;
        --card: #ffffff;
        --line: #dddddd;
        --radius: 10px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: #111;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: .75rem 1rem;
        background: #fff;
        border-bottom: 1px solid #e5e5e5;
        gap: 1rem;
      }
      .top-left {
        display: flex;
        gap: .5rem;
        align-items: center;
      }
      .tag {
        background: #eef;
        border: 1px solid #d4dfff;
        border-radius: 999px;
        padding: .15rem .6rem;
        font-size: .7rem;
      }
      main {
        display: flex;
        height: calc(100vh - 56px);
      }
      aside {
        width: 280px;
        border-right: 1px solid #ddd;
        background: #fff;
        overflow-y: auto;
      }
      .toolbar {
        padding: .5rem;
        border-bottom: 1px solid #eee;
      }
      .toolbar input, .toolbar select {
        width: 100%;
        margin-bottom: .4rem;
      }
      .list {
        display: flex;
        flex-direction: column;
      }
      .item {
        padding: .55rem .75rem;
        border-bottom: 1px solid #f1f1f1;
        cursor: pointer;
      }
      .item small {
        display: block;
        font-size: .65rem;
        color: #666;
      }
      .item.active {
        background: #e4f1ff;
      }
      section#detail {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .detail-toolbar {
        display: flex;
        gap: .5rem;
        padding: .75rem 1rem;
        border-bottom: 1px solid #ddd;
        background: #fff;
      }
      .detail-toolbar button {
        border: 1px solid #ccc;
        background: #fff;
        border-radius: 6px;
        padding: .35rem .7rem;
        cursor: pointer;
      }
      .detail-toolbar button.primary {
        background: #1976d2;
        color: #fff;
        border-color: #1976d2;
      }
      .detail-body {
        flex: 1;
        overflow-y: auto;
        padding: 1rem 1rem 5rem;
      }
      label {
        display: block;
        font-size: .75rem;
        margin-bottom: .25rem;
        color: #333;
      }
      input[type="text"],
      textarea {
        width: 100%;
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: .4rem .5rem;
        font-family: inherit;
        font-size: .85rem;
      }
      textarea {
        min-height: 130px;
      }
      .field {
        margin-bottom: .75rem;
      }
      .stats {
        display: flex;
        gap: .5rem;
        align-items: center;
      }
      .stat-card {
        background: #f5f7ff;
        border: 1px solid #dfe5ff;
        border-radius: 8px;
        padding: .25rem .6rem;
        font-size: .7rem;
      }
      .code-field {
        font-family: ui-monospace, SFMono-Regular, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
      @media (max-width: 900px) {
        main { flex-direction: column; }
        aside { width: 100%; height: 200px; }
        section#detail { height: calc(100vh - 56px - 200px); }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="top-left">
        <strong>StratGen – Content Admin</strong>
        <span class="tag" id="current-api"></span>
      </div>
      <div class="stats" id="stats"></div>
    </header>
    <main>
      <aside>
        <div class="toolbar">
          <input type="text" id="search" placeholder="Suche Titel..." />
          <select id="filter-status">
            <option value="">alle Status</option>
            <option value="draft">Draft</option>
            <option value="published">Published</option>
            <option value="archived">Archived</option>
          </select>
          <button id="new-content">+ Neu</button>
        </div>
        <div id="items" class="list"></div>
      </aside>
      <section id="detail">
        <div class="detail-toolbar">
          <button class="primary" id="save-btn">Speichern</button>
          <button id="publish-btn">Veröffentlichen</button>
          <button id="clone-btn">Klonen</button>
          <button id="delete-btn" style="margin-left:auto;color:#a00;">Löschen</button>
        </div>
        <div class="detail-body">
          <div class="field">
            <label for="name">Name</label>
            <input id="name" type="text" readonly />
          </div>
          <div class="field">
            <label for="title">Titel</label>
            <input id="title" type="text" />
          </div>
          <div class="field">
            <label for="mission_id">Mission ID</label>
            <input id="mission_id" type="text" />
          </div>
          <div class="field">
            <label for="status">Status</label>
            <input id="status" type="text" readonly />
          </div>
          <div class="field">
            <label for="outline">Outline (JSON)</label>
            <textarea id="outline" class="code-field" placeholder='{"sections":["Intro"]}'></textarea>
          </div>
          <div class="field">
            <label for="facts">Facts (JSON Array)</label>
            <textarea id="facts" class="code-field" placeholder='[{"metric":"ctr","value":3.2}]'></textarea>
          </div>
          <div class="field">
            <label for="extra">Extra (JSON)</label>
            <textarea id="extra" class="code-field" placeholder='{}'></textarea>
          </div>
        </div>
      </section>
    </main>
    <script src="./content.js"></script>
  </body>
</html>
