<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Strategy Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #f5f5f5;
        --card: #ffffff;
        --line: #dddddd;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
      }
      header {
        display: flex;
        gap: 1rem;
        align-items: center;
        padding: 1rem 1.5rem;
        background: #fff;
        border-bottom: 1px solid #ddd;
      }
      main {
        display: flex;
        gap: 1rem;
        padding: 1rem;
        height: calc(100vh - 60px);
      }
      .list {
        width: 280px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        overflow-y: auto;
      }
      .item {
        padding: .6rem .8rem;
        border-bottom: 1px solid #eee;
        cursor: pointer;
      }
      .item:hover { background: #f0f4ff; }
      .item.active { background: #d9e5ff; }
      .detail {
        flex: 1;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      label {
        display: block;
        font-size: .75rem;
        color: #444;
        margin-bottom: .25rem;
      }
      input, textarea, select {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: .4rem .5rem;
        font: inherit;
      }
      textarea {
        min-height: 120px;
      }
      .row {
        display: flex;
        gap: 1rem;
      }
      .row > div {
        flex: 1;
      }
      .actions {
        display: flex;
        gap: .5rem;
      }
      button {
        border: none;
        background: #2d5cff;
        color: #fff;
        padding: .5rem .9rem;
        border-radius: 6px;
        cursor: pointer;
      }
      button.secondary {
        background: #eee;
        color: #333;
      }
      .muted {
        font-size: .7rem;
        color: #666;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 style="font-size:1.1rem; margin:0;">Strategy Admin</h1>
      <input id="search" placeholder="suchen nach Titel..." />
      <select id="filter-status">
        <option value="">alle Stati</option>
        <option value="generated">generated</option>
        <option value="approved">approved</option>
        <option value="delivered">delivered</option>
      </select>
      <button id="btn-refresh">Neu laden</button>
    </header>
    <main>
      <div class="list" id="strategy-list"></div>
      <div class="detail" id="strategy-detail">
        <p class="muted">Bitte links eine Strategie auswählen.</p>
      </div>
    </main>
    <script src="./strategy.js"></script>
  </body>
</html>
